      :root {

        box-shadow: 0 0 0 0.25vw rgba(255, 255, 255, 0.08) inset;
      }

      .rowText {
        font-size: 3.1vw;
        font-weight: 850;
        letter-spacing: 0.02vw;

      }

      .subText {

        letter-spacing: 0.02vw;

      .right .rule {

    var WINDOW_MIN = 120;

function pad2(n) {
  return (n < 10 ? "0" : "") + n;
}

function fmtClock(d) {
  return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
}

function toDateToday(hhmm) {
  var parts = hhmm.split(":");
  var h = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10);

  var d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}

function minsBetween(a, b) {
  return Math.floor((b - a) / 60000);
}

function fmtDuration(mins) {
  if (mins < 0) mins = 0;
  if (mins < 60) return mins + " minute" + (mins > 1 ? "s" : "");
  var h = Math.floor(mins / 60);
  var m = mins % 60;
  return m ? (h + "h " + m + " minutes") : (h + "h");
}

function cap(s) {
  if (!s) return "";
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function getCurrentPark() {
  var parkId = "neupre";

  if (window.location.search) {
    var query = window.location.search.substring(1);
    var parts = query.split("&");
    var i, pair;

    for (i = 0; i < parts.length; i++) {
      pair = parts[i].split("=");
      if (pair[0] === "park" && pair[1]) {
        parkId = pair[1];
      }
    }
  }

  parkId = parkId.toLowerCase();

  if (PARKS[parkId]) {
    return PARKS[parkId];
  }

  return PARKS["neupre"];
}

var currentPark = getCurrentPark();

var parkNameEl = document.getElementById("parkName");
if (parkNameEl) {
  parkNameEl.textContent = currentPark.name;
}

var DAY = [];
var i, item;

for (i = 0; i < currentPark.schedule.length; i++) {
  item = currentPark.schedule[i];
  DAY.push({
    timeStr: item.time,
    colorName: item.color,
    colorLabel: cap(item.color),
    colorHex: COLOR_HEX[item.color] || "#ffffff",
    time: toDateToday(item.time)
  });
}

function render() {
  var now = new Date();
  var clockEl = document.getElementById("clock");
  if (clockEl) {
    clockEl.textContent = fmtClock(now);
  }

  var upcoming = [];
  var s, minsLeft;

  for (i = 0; i < DAY.length; i++) {
    s = DAY[i];
    minsLeft = minsBetween(now, s.time);

    if (minsLeft > 0 && minsLeft <= WINDOW_MIN) {
      upcoming.push({
        timeStr: s.timeStr,
        colorLabel: s.colorLabel,
        colorHex: s.colorHex,
        minsLeft: minsLeft
      });
    }
  }

  upcoming.sort(function(a, b) {
    return a.minsLeft - b.minsLeft;
  });

  var upcomingEl = document.getElementById("upcomingRows");
  var html = "";

  for (i = 0; i < upcoming.length; i++) {
    s = upcoming[i];
    html +=
      '<div class="row">' +
        '<div class="dot" style="background:' + s.colorHex + '"></div>' +
        '<div class="rowText">' + fmtDuration(s.minsLeft) + ' – ' + s.colorLabel + '</div>' +
        '<div class="subText">' + s.timeStr + '</div>' +
      '</div>';
  }

  if (upcomingEl) {
    upcomingEl.innerHTML = html;
  }

  var past = [];
  var minsAgo;

  for (i = 0; i < DAY.length; i++) {
    s = DAY[i];
    minsAgo = minsBetween(s.time, now);

    if (minsAgo >= 0) {
      past.push({
        timeStr: s.timeStr,
        colorLabel: s.colorLabel,
        colorHex: s.colorHex,
        minsAgo: minsAgo
      });
    }
  }

  past.sort(function(a, b) {
    return a.minsAgo - b.minsAgo;
  });

  var last = past.length ? past[0] : null;
  var lastEl = document.getElementById("lastRow");
  var rightStatus = document.getElementById("rightStatus");

  if (last) {
    if (lastEl) {
      lastEl.innerHTML =
        '<div class="rightRow">' +
          '<div class="dot" style="background:' + last.colorHex + '"></div>' +
          '<div class="rowText">' + fmtDuration(last.minsAgo) + ' – ' + last.colorLabel + '</div>' +
        '</div>';
    }
    if (rightStatus) {
      rightStatus.textContent = "Dernière sortie : " + last.timeStr;
    }
  } else {
    if (lastEl) {
      lastEl.innerHTML = "";
    }
    if (rightStatus) {
      rightStatus.textContent = "Aucune sortie encore aujourd’hui.";
    }
  }

  var mainStatus = document.getElementById("mainStatus");

  if (!DAY.length) {
    if (mainStatus) {
      mainStatus.textContent = "Aucun horaire configuré pour ce parc.";
    }
    return;
  }

  var first = DAY[0].time;
  var lastSlot = DAY[DAY.length - 1].time;

  if (now < first) {
    if (mainStatus) {
      mainStatus.textContent = "Les sessions commencent à " + DAY[0].timeStr + ".";
    }
  } else if (now > lastSlot && upcoming.length === 0) {
    if (mainStatus) {
      mainStatus.textContent = "Fin des sorties pour aujourd’hui.";
    }
  } else {
    if (mainStatus) {
      mainStatus.textContent = "";
    }
  }
}

render();
setInterval(render, 1000);
</script>
