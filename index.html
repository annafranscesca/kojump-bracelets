<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KOJUMP - Temps restant</title>

    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      .koko-img {
        margin-top: 6vh;
        width: 16vw;
        max-width: 220px;
        height: auto;
        object-fit: contain;
        user-select: none;
        filter: drop-shadow(0 0 1vw rgba(0, 0, 0, 0.25));
      }

      .logo-img {
        margin-left: 0.9vw;
        width: 15vw;
        height: auto;
        max-width: none;
        object-fit: contain;
        transform: none;
        filter: drop-shadow(0 0 0.6vw rgba(0, 0, 0, 0.35));
      }

      :root {
        --bg-left: #0c1f4a;
        --bg-main: #0e40b4;
        --bg-right: #0b234f;
        --line: rgba(255, 255, 255, 0.45);
        --white: #fff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: #000;
      }

      body {
        font-family:
          "Oswald",
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        color: var(--white);
        overflow: hidden;
      }

      .wrap {
        height: 100vh;
        width: 100vw;
        display: grid;
        grid-template-columns: 18vw 57vw 25vw;
      }

      .left {
        background: var(--bg-left);
        padding: 2vh 2.5vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      .main {
        background: var(--bg-main);
        padding: 5vh 3vw;
      }

      .right {
        background: var(--bg-right);
        padding: 5vh 2.6vw;
      }

      .park-name {
        font-size: 1.8vw;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.78);
        margin: -5vh 0 1vh 0;
        text-align: center;
        line-height: 1.2;
      }

      .kicker {
        font-size: 2.1vw;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.72);
        margin: 0 0 0.6vh 0;
      }

      .title {
        font-size: 3.4vw;
        font-weight: 900;
        margin: 0 0 1.6vh 0;
        line-height: 1.05;
      }

      .rule {
        height: 0.35vh;
        background: var(--line);
        margin: 1.6vh 0 1.6vh 0;
      }

      .rows {
        margin-top: 1vh;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 1.8vw;
        padding: 2.1vh 0;
        border-bottom: 0.35vh solid var(--line);
      }

      .dot {
        width: 2.7vw;
        height: 2.7vw;
        border-radius: 999px;
        flex: 0 0 2.7vw;
        box-shadow: 0 0 0 0.25vw rgba(255, 255, 255, 0.08) inset;
      }

      .rowText {
        font-size: 3.1vw;
        font-weight: 850;
        letter-spacing: 0.02vw;
        white-space: nowrap;
      }

      .subText {
        margin-left: auto;
        font-size: 1.6vw;
        color: rgba(255, 255, 255, 0.78);
        font-weight: 700;
        letter-spacing: 0.02vw;
        white-space: nowrap;
      }

      .clock {
        font-size: 4.2vw;
        font-weight: 950;
        text-align: center;
        letter-spacing: 0.08vw;
        margin: 0 0 2.2vh 0;
      }

      .rightTitleSmall {
        font-size: 2.1vw;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: 0.05vw;
        margin: 2.4vh 0 0 0;
      }

      .rightTitleBig {
        font-size: 3vw;
        font-weight: 950;
        margin: 0;
        line-height: 1;
      }

      .rightRow {
        display: flex;
        align-items: center;
        gap: 1.8vw;
        padding: 2.4vh 0;
        border-bottom: 0.35vh solid var(--line);
        margin-top: -1vh;
        min-width: 0;
      }

      .rightRow .rowText {
        font-size: 2vw;
        margin-top: -0.8vh;
        white-space: nowrap;
        min-width: 0;
        flex: 1;
      }

      .status {
        margin-top: 1.6vh;
        font-size: 1.25vw;
        color: rgba(255, 255, 255, 0.75);
      }

      .right .rule {
        margin-top: 2.5vh;
      }

      .title {
        font-size: clamp(40px, 3.4vw, 75px);
      }

      .kicker {
        font-size: clamp(20px, 2vw, 40px);
      }

      .rowText {
        font-size: clamp(36px, 3.6vw, 70px);
      }

      .subText {
        font-size: clamp(14px, 1.5vw, 26px);
      }

      .clock {
        font-size: clamp(42px, 4vw, 80px);
      }

      .rightTitleSmall {
        font-size: clamp(18px, 2vw, 36px);
      }

      .rightTitleBig {
        font-size: clamp(30px, 3vw, 54px);
      }

      .rightRow .rowText {
        font-size: clamp(24px, 2.2vw, 43px);
      }

      @media (max-width: 1600px) {
        .wrap {
          grid-template-columns: 20vw 55vw 25vw;
        }

        .row {
          gap: 1vw;
        }

        .rowText {
          font-size: 2.6vw;
        }

        .subText {
          font-size: 1.3vw;
        }

        .rightRow .rowText {
          font-size: 1.6vw;
        }

        .clock {
          font-size: 3.5vw;
        }
      }

      .rowText,
      .rightRow .rowText {
        min-width: 0;
        flex: 1;
      }

      .wrap {
        max-width: 1920px;
        margin: auto;
      }
    </style>
  </head>

    <div class="wrap">
      <div class="left">
        <div class="logo-box">
          <img src="logo-kojump.png" alt="Kojump" class="logo-img" />
          <p id="parkName" class="park-name">KOJUMP</p>
          <img src="koko.png" alt="koko" class="koko-img" />
        </div>
      </div>

      <div class="main">
        <p class="kicker">En pleine session de jump</p>
        <h1 class="title">Il vous reste...</h1>
        <div class="rule"></div>

        <div id="upcomingRows" class="rows"></div>
        <div id="mainStatus" class="status"></div>
      </div>

      <div class="right">
        <div id="clock" class="clock">--:--</div>

        <div class="rightTitleSmall">C'est fini</div>
        <div class="rightTitleBig">depuis</div>
        <div class="rule"></div>

        <div id="lastRow"></div>
        <div id="rightStatus" class="status"></div>

      var WINDOW_MIN = 120;

      function getCurrentPark() {
        var parkId = "neupre";

        if (window.location.search) {
          var query = window.location.search.substring(1);
          var parts = query.split("&");
          var i, pair;

          for (i = 0; i < parts.length; i++) {
            pair = parts[i].split("=");
            if (pair[0] === "park" && pair[1]) {
              parkId = pair[1];
            }
          }
        }

        parkId = parkId.toLowerCase();

        if (PARKS[parkId]) {
          return PARKS[parkId];
        }

        return PARKS["neupre"];
      }

      var currentPark = getCurrentPark();

      function getCurrentLang() {
        return currentPark.lang || "fr";
      }

      function getUIText(key) {
        var lang = getCurrentLang();

        if (UI_TEXTS[lang] && UI_TEXTS[lang][key]) {
          return UI_TEXTS[lang][key];
        }

        return UI_TEXTS.fr[key] || "";
      }

      function pad2(n) {
        return (n < 10 ? "0" : "") + n;
      }

      function fmtClock(d) {
        return pad2(d.getHours()) + ":" + pad2(d.getMinutes());
      }

      function toDateToday(hhmm) {
        var parts = hhmm.split(":");
        var h = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10);

        var d = new Date();
        d.setHours(h, m, 0, 0);
        return d;
      }

      function minsBetween(a, b) {
        return Math.floor((b - a) / 60000);
      }

      function fmtDuration(mins) {
        var lang = getCurrentLang();

        if (mins < 0) mins = 0;

        if (mins < 60) {
          if (mins > 1) {
            return mins + " " + getUIText("minutes");
          }
          return mins + " " + getUIText("minute");
        }

        var h = Math.floor(mins / 60);
        var m = mins % 60;

        if (lang === "nl") {
          if (m) {
            return h + "u " + m + " " + getUIText("minutes");
          }
          return h + "u";
        }

        if (m) {
          return h + "h " + m + " " + getUIText("minutes");
        }

        return h + "h";
      }

      function cap(s) {
        if (!s) return "";
        return s.charAt(0).toUpperCase() + s.slice(1);
      }

      function getColorLabel(colorName) {
        var lang = currentPark.lang || "fr";

        if (COLOR_LABELS[lang] && COLOR_LABELS[lang][colorName]) {
          return COLOR_LABELS[lang][colorName];
        }

        return cap(colorName);
      }

      var parkNameEl = document.getElementById("parkName");
      if (parkNameEl) {
        parkNameEl.textContent = currentPark.name;
      }

      var kickerEl = document.querySelector(".kicker");
      if (kickerEl) {
        kickerEl.textContent = getUIText("kicker");
      }

      var titleEl = document.querySelector(".title");
      if (titleEl) {
        titleEl.textContent = getUIText("title");
      }

      var rightSmallEl = document.querySelector(".rightTitleSmall");
      if (rightSmallEl) {
        rightSmallEl.textContent = getUIText("rightSmall");
      }

      var rightBigEl = document.querySelector(".rightTitleBig");
      if (rightBigEl) {
        rightBigEl.textContent = getUIText("rightBig");
      }

      var DAY = [];
      var i, item;

      for (i = 0; i < currentPark.schedule.length; i++) {
        item = currentPark.schedule[i];
        DAY.push({
          timeStr: item.time,
          colorName: item.color,
          colorLabel: getColorLabel(item.color),
          colorHex: COLOR_HEX[item.color] || "#ffffff",
          time: toDateToday(item.time),
        });
      }

        var now = new Date();
        var clockEl = document.getElementById("clock");
        if (clockEl) {
          clockEl.textContent = fmtClock(now);
        }

        var upcoming = [];
        var s, minsLeft;

        for (i = 0; i < DAY.length; i++) {
          s = DAY[i];
          minsLeft = minsBetween(now, s.time);

          if (minsLeft > 0 && minsLeft <= WINDOW_MIN) {
            upcoming.push({
              timeStr: s.timeStr,
              colorLabel: s.colorLabel,
              colorHex: s.colorHex,
              minsLeft: minsLeft,
            });
          }
        }

        upcoming.sort(function (a, b) {
          return a.minsLeft - b.minsLeft;
        });

        var upcomingEl = document.getElementById("upcomingRows");
        var html = "";

        for (i = 0; i < upcoming.length; i++) {
          s = upcoming[i];
          html +=
            '<div class="row">' +
            '<div class="dot" style="background:' +
            s.colorHex +
            '"></div>' +
            '<div class="rowText">' +
            fmtDuration(s.minsLeft) +
            " – " +
            s.colorLabel +
            "</div>" +
            '<div class="subText">' +
            s.timeStr +
            "</div>" +
            "</div>";
        }

        if (upcomingEl) {
          upcomingEl.innerHTML = html;
        }

        var past = [];
        var minsAgo;

        for (i = 0; i < DAY.length; i++) {
          s = DAY[i];
          minsAgo = minsBetween(s.time, now);

          if (minsAgo >= 0) {
            past.push({
              timeStr: s.timeStr,
              colorLabel: s.colorLabel,
              colorHex: s.colorHex,
              minsAgo: minsAgo,
            });
          }
        }

        past.sort(function (a, b) {
          return a.minsAgo - b.minsAgo;
        });

        var last = past.length ? past[0] : null;
        var lastEl = document.getElementById("lastRow");
        var rightStatus = document.getElementById("rightStatus");

        if (last) {
          if (lastEl) {
            lastEl.innerHTML =
              '<div class="rightRow">' +
              '<div class="dot" style="background:' +
              last.colorHex +
              '"></div>' +
              '<div class="rowText">' +
              fmtDuration(last.minsAgo) +
              " – " +
              last.colorLabel +
              "</div>" +
              "</div>";
          }
          if (rightStatus) {
            rightStatus.textContent = getUIText("lastExit") + last.timeStr;
          }
        } else {
          if (lastEl) {
            lastEl.innerHTML = "";
          }
          if (rightStatus) {
            rightStatus.textContent = getUIText("noExitYet");
          }
        }

        var mainStatus = document.getElementById("mainStatus");

        if (!DAY.length) {
          if (mainStatus) {
            mainStatus.textContent = getUIText("noSchedule");
          }
          return;
        }

        var first = DAY[0].time;
        var lastSlot = DAY[DAY.length - 1].time;

        if (now < first) {
          if (mainStatus) {
            mainStatus.textContent = getUIText("startsAt") + DAY[0].timeStr + ".";
          }
        } else if (now > lastSlot && upcoming.length === 0) {
          if (mainStatus) {
            mainStatus.textContent = getUIText("dayFinished");
          }
        } else {
          if (mainStatus) {
            mainStatus.textContent = "";
          }
        }
      }

      render();
      setInterval(render, 1000);
    </script>
  </body>
</html>
